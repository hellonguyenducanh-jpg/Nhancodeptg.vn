<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG BẢO TRÌ</title>
    <style>
        /* Sử dụng font hệ thống để tránh lỗi mất chữ khi không có mạng hoặc lag */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        
        body {
            background-color: #f4f6f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .maintenance-card {
            background: #ffffff;
            width: 100%;
            max-width: 380px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 6px solid #f1904e;
        }
        
        .image-wrapper {
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .maintenance-img {
            width: 100%;
            display: block;
            height: auto;
        }

        .status-badge {
            background: #fff3cd;
            color: #856404;
            display: inline-block;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid #ffe58f;
        }

        h2 { 
            color: #333333; 
            font-size: 20px; 
            font-weight: 800; 
            margin-bottom: 15px;
            display: block; /* Đảm bảo luôn hiển thị */
        }
        
        .info-content {
            background: #fafafa;
            border: 1px dashed #cccccc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .info-content p {
            font-size: 14px;
            color: #555555;
            line-height: 1.5;
            margin: 5px 0;
        }

        .highlight-time {
            display: block;
            color: #e74c3c;
            font-size: 18px;
            font-weight: 900;
            margin-top: 8px;
        }

        .btn-check {
            background: #f1904e;
            color: #ffffff;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #d97b3d;
        }

        .footer-note {
            font-size: 11px;
            color: #999999;
            margin-top: 20px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        
        <div class="image-wrapper">
            <img src="https://i.postimg.cc/5t9mZpdS/IMG-3110.jpg" alt="Maintenance" class="maintenance-img">
        </div>

        <div class="status-badge">🛠️ Đang Đồng Bộ Máy Chủ...</div>
        
        <h2>THÔNG BÁO NÂNG CẤP</h2>

        <div class="info-content">
            <p>Hệ thống nhận quà <b>Play Together VNG</b> đang được bảo trì để cập nhật Code mới.</p>
            <p>Dự kiến mở lại lúc:</p>
            <span class="highlight-time">20:25 Tối Hôm Nay</span>
        </div>

        <button class="btn-check" onclick="location.reload()">KIỂM TRA TRẠNG THÁI</button>
        
        <div class="footer-note">
            <b>© NhaSangTaoPTG - Play Together Creator</b>
        </div>

    </div>

</body>
</html>
